<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\style.css">
    <title>Lista de Tarefas - Organize sua Agenda!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class = "p-3 mb-2 bg-primary text-white text-right">
        <h1>Lista de Tarefas</h1>
    </header>

    <nav class = "p-3 mb-2 bg-primary-subtle text-primary-emphasis">
        <input type="text" id = "nome">
        <select id = "prioridade">
            <option>Alta</option>
            <option>Média</option>
            <option>Baixa</option>
        </select>
        <button onclick="criar_tarefa()">Adicionar Tarefa</button>
    </nav>

    <div class = "m-3 d-flex flex-wrap justify-content-evenly gap-3" id = "tc"></div>

    <script src = "scripts/script.js"></script>
</body>
</html>
